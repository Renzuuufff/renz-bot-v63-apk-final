name: Build RENZ Bot APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show uploaded files
        run: ls -la

      - name: Unzip RENZ Bot project payload
        run: |
          mkdir renz_project
          unzip -o renz_bot_v63_project_payload.zip -d renz_project
          echo "Extracted files:"
          find renz_project -maxdepth 3 -type f | head -n 80

      - name: Find Android project directory
        run: |
          FOUND=$(find renz_project -name settings.gradle -type f | head -n 1)

          if [ -z "$FOUND" ]; then
            echo "ERROR: settings.gradle not found. The uploaded ZIP may be wrong."
            exit 1
          fi

          DIR=$(dirname "$FOUND")
          echo "PROJECT_DIR=$DIR" >> $GITHUB_ENV
          echo "Project directory: $DIR"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RENZ-Bot-v63-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
